services:
  - type: web
    name: guimi-xiaozhen
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: guimi-db
          property: connectionString

databases:
  - name: guimi-db
    databaseName: guimi_xiaozhen
    user: guimi_user
    plan: free
